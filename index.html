<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INTERFREIGHT | Leave History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fb;
padding:30px;
}

/* HEADER */

.hero{

background:linear-gradient(135deg,#003366,#004d99);

color:white;

padding:25px 35px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.hero h1{

font-size:34px;

}

.hero p{

margin-top:5px;

opacity:.9;

}

.btn{

background:#F4C542;

color:#003366;

padding:12px 20px;

border:none;

border-radius:12px;

font-weight:bold;

cursor:pointer;

text-decoration:none;

}

/* STATS */

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.stat{

background:white;

padding:25px;

border-radius:20px;

border-top:5px solid #F4C542;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.stat h3{

color:#666;

font-size:15px;

margin-bottom:10px;

}

.stat span{

font-size:40px;

font-weight:bold;

color:#003366;

}

/* FILTER */

.filter{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

margin-bottom:25px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:15px;

}

.filter input,
.filter select{

padding:12px;

border:1px solid #ddd;

border-radius:10px;

}

/* TABLE */

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#003366;

color:white;

padding:14px;

text-align:left;

}

td{

padding:14px;

border-bottom:1px solid #eee;

}

.status{

padding:6px 14px;

border-radius:20px;

font-weight:bold;

color:white;

}

.approved{

background:#28a745;

}

.rejected{

background:#dc3545;

}

.pending{

background:#ffc107;

color:#333;

}

tr:hover{

background:#f8fafc;

}

</style>

</head>

<body>

<div class="hero">

<div>

<h1>Leave History</h1>

<p id="managerInfo">
Loading...
</p>

</div>

<a href="https://interfreight.github.io/managers_portal/" class="btn">

← Dashboard

</a>

</div>

<div class="stats">

<div class="stat">

<h3>Total Approved</h3>

<span id="approvedCount">0</span>

</div>

<div class="stat">

<h3>Total Rejected</h3>

<span id="rejectedCount">0</span>

</div>

<div class="stat">

<h3>Total Records</h3>

<span id="totalCount">0</span>

</div>

</div>

<div class="filter">

<input
type="text"
id="searchEmployee"
placeholder="Search employee...">

<select id="statusFilter">

<option value="ALL">All Status</option>

<option>Approved</option>

<option>Rejected</option>

</select>

<select id="leaveTypeFilter">

<option value="ALL">All Leave Types</option>

<option>Vacation Leave</option>

<option>Sick Leave</option>

<option>Emergency Leave</option>

<option>Birthday Leave</option>

<option>Maternity Leave</option>

<option>Paternity Leave</option>

<option>Study Leave</option>

</select>

<input
type="date"
id="dateFilter">

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Employee</th>

<th>Department</th>

<th>Leave Type</th>

<th>Date From</th>

<th>Date To</th>

<th>Days</th>

<th>Status</th>

<th>Approved By</th>

<th>Approved Date</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="9" style="text-align:center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script>

const db = window.supabase.createClient(
"https://tuihpvykuqbqnfyfepql.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aWhwdnlrdXFicW5meWZlcHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjg4OTcsImV4cCI6MjA5NzMwNDg5N30.HZKS8CgFLjkZ-Bx2AIjFjurH3IsKjvf37Ft852CzJsQ"
);

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
location.href="https://interfreight.github.io/login/";
}

document.getElementById("managerInfo").innerHTML =
currentUser.full_name + " • " + currentUser.role;


// Detect manager department
function getManagerDepartment(){

const role = (currentUser.role || "").toUpperCase();

if(role==="TRANSPORT MANAGER") return "Transport";
if(role==="OPERATIONS MANAGER") return "Operations";
if(role==="SALES MANAGER") return "Sales";
if(role==="ACCOUNTING MANAGER") return "Accounting";
if(role==="FORWARDING MANAGER") return "Forwarding";
if(role==="HR") return "ALL";

return null;

}


// Load Leave History
async function loadHistory(){

const tbody =
document.getElementById("historyTable");

tbody.innerHTML =
"<tr><td colspan='9'>Loading...</td></tr>";

let query =
db
.from("employee_leaves")
.select("*")
.in("status",["Approved","Rejected"])
.order("approved_date",{ascending:false});

const dept =
getManagerDepartment();

if(dept!=="ALL"){

query =
query.eq("department",dept);

}

const {data,error} =
await query;

if(error){

tbody.innerHTML =
"<tr><td colspan='9'>"+error.message+"</td></tr>";

return;

}

renderTable(data);

}


// Display table
function renderTable(data){

const tbody =
document.getElementById("historyTable");

tbody.innerHTML="";

let approved=0;
let rejected=0;

data.forEach(row=>{

if(row.status==="Approved") approved++;
if(row.status==="Rejected") rejected++;

tbody.innerHTML += `

<tr>

<td>${row.employee_name}</td>

<td>${row.department}</td>

<td>${row.leave_type}</td>

<td>${row.date_from}</td>

<td>${row.date_to}</td>

<td>${row.total_days}</td>

<td>

<span class="status ${row.status.toLowerCase()}">

${row.status}

</span>

</td>

<td>${row.approved_by || "-"}</td>

<td>

${row.approved_date ?

new Date(row.approved_date).toLocaleString()

: "-"}

</td>

</tr>

`;

});

document.getElementById("approvedCount").textContent =
approved;

document.getElementById("rejectedCount").textContent =
rejected;

document.getElementById("totalCount").textContent =
data.length;

window.leaveData = data;

}


// SEARCH/FILTER
function applyFilters(){

let rows =
window.leaveData || [];

const employee =
document.getElementById("searchEmployee").value.toLowerCase();

const status =
document.getElementById("statusFilter").value;

const leave =
document.getElementById("leaveTypeFilter").value;

const date =
document.getElementById("dateFilter").value;

rows =
rows.filter(r=>{

if(employee &&
!r.employee_name.toLowerCase().includes(employee))
return false;

if(status!="ALL" &&
r.status!=status)
return false;

if(leave!="ALL" &&
r.leave_type!=leave)
return false;

if(date &&
r.date_from!=date)
return false;

return true;

});

renderTable(rows);

}


document.getElementById("searchEmployee")
.addEventListener("keyup",applyFilters);

document.getElementById("statusFilter")
.addEventListener("change",applyFilters);

document.getElementById("leaveTypeFilter")
.addEventListener("change",applyFilters);

document.getElementById("dateFilter")
.addEventListener("change",applyFilters);


// Auto Refresh every 5 seconds
loadHistory();

setInterval(loadHistory,5000);

</script>

</body>
</html>
