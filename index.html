<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INTERFREIGHT | Leave History</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fb;
padding:30px;
}

/* HEADER */

.hero{

background:linear-gradient(135deg,#003366,#004d99);

color:white;

padding:25px 35px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.hero h1{

font-size:34px;

}

.hero p{

margin-top:5px;

opacity:.9;

}

.btn{

background:#F4C542;

color:#003366;

padding:12px 20px;

border:none;

border-radius:12px;

font-weight:bold;

cursor:pointer;

text-decoration:none;

}

/* STATS */

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.stat{

background:white;

padding:25px;

border-radius:20px;

border-top:5px solid #F4C542;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.stat h3{

color:#666;

font-size:15px;

margin-bottom:10px;

}

.stat span{

font-size:40px;

font-weight:bold;

color:#003366;

}

/* FILTER */

.filter{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

margin-bottom:25px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:15px;

}

.filter input,
.filter select{

padding:12px;

border:1px solid #ddd;

border-radius:10px;

}

/* TABLE */

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#003366;

color:white;

padding:14px;

text-align:left;

}

td{

padding:14px;

border-bottom:1px solid #eee;

}

.status{

padding:6px 14px;

border-radius:20px;

font-weight:bold;

color:white;

}

.approved{

background:#28a745;

}

.rejected{

background:#dc3545;

}

.pending{

background:#ffc107;

color:#333;

}

tr:hover{

background:#f8fafc;

}

</style>

</head>

<body>

<div class="hero">

<div>

<h1>Leave History</h1>

<p id="managerInfo">
Loading...
</p>

</div>

<a href="manager_portal.html" class="btn">

← Dashboard

</a>

</div>

<div class="stats">

<div class="stat">

<h3>Total Approved</h3>

<span id="approvedCount">0</span>

</div>

<div class="stat">

<h3>Total Rejected</h3>

<span id="rejectedCount">0</span>

</div>

<div class="stat">

<h3>Total Records</h3>

<span id="totalCount">0</span>

</div>

</div>

<div class="filter">

<input
type="text"
id="searchEmployee"
placeholder="Search employee...">

<select id="statusFilter">

<option value="ALL">All Status</option>

<option>Approved</option>

<option>Rejected</option>

</select>

<select id="leaveTypeFilter">

<option value="ALL">All Leave Types</option>

<option>Vacation Leave</option>

<option>Sick Leave</option>

<option>Emergency Leave</option>

<option>Birthday Leave</option>

<option>Maternity Leave</option>

<option>Paternity Leave</option>

<option>Study Leave</option>

</select>

<input
type="date"
id="dateFilter">

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Employee</th>

<th>Department</th>

<th>Leave Type</th>

<th>Date From</th>

<th>Date To</th>

<th>Days</th>

<th>Status</th>

<th>Approved By</th>

<th>Approved Date</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="9" style="text-align:center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script>

const db =
window.supabase.createClient(
"https://YOUR_PROJECT.supabase.co",
"YOUR_ANON_KEY"
);

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

document.getElementById("managerInfo").innerHTML=
currentUser.full_name+
" • "+
currentUser.role;

</script>

</body>
</html>
